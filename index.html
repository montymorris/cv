<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monty Morris</title>

  <style>
    @font-face {
      font-family: "Akkurat Pro";
      src: local("Akkurat Pro"), local("Akkurat");
    }

    @font-face {
      font-family: "Avenir";
      src: local("Avenir"), local("Avenir Next");
    }

    :root {
      --bg: #fffdd;
      --text: #586c5c;
      --accent: #6f8f76;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Avenir", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .container {
      width: 90%;
      max-width: 600px;
    }

    h1 {
      font-family: "Avenir", sans-serif;
      font-weight: bold;
      font-size: clamp(2rem, 5vw, 3.5rem);
      margin-bottom: 1rem;
    }

    p {
      font-size: clamp(1rem, 2vw, 1.2rem);
      margin-bottom: 2rem;
    }

    .links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      font-family: "Akkurat Pro", sans-serif;
      padding: 0.8rem 1.4rem;
      border: 2px solid var(--text);
      background: transparent;
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s ease;
      min-width: 160px; /* ensures equal sizing */
      text-align: center;
    }

    .btn:hover {
      background: var(--text);
      color: var(--bg);
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .modal-content {
      background: var(--bg); /* solid background */
      padding: 2rem;
      border-radius: 10px;
      text-align: center;
      max-width: 90%;
      width: 300px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .modal-content h2 {
      font-family: "Avenir", sans-serif;
      font-weight: bold;
      margin-bottom: 1rem;
    }

    .close {
      margin-top: 1.5rem;
      display: inline-block;
      cursor: pointer;
      font-family: "Akkurat Pro", sans-serif;
      border: 1px solid var(--text);
      padding: 0.5rem 1rem;
    }

    @media (max-width: 600px) {
      .links {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Monty Morris</h1>
    <p>Sound • Theatre • Technology</p>

    <div class="links">
      <a href="montymorris-cv.pdf" class="btn" target="_blank">View CV</a>
      <a href="https://www.linkedin.com/in/monty-morris" class="btn" target="_blank">LinkedIn</a>
      <button class="btn" onclick="openModal()">Contact</button>
    </div>
  </div>

  <div class="modal" id="contactModal">
    <div class="modal-content">
      <h2>Contact</h2>
      <p>📞 07587 434466</p>
      <p>✉️ montymorris01@gmail.com</p>
      <div class="close" onclick="closeModal()">Close</div>
    </div>
  </div>

  <script>
    function openModal() {
      document.getElementById('contactModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('contactModal').style.display = 'none';
    }

    window.onclick = function(e) {
      const modal = document.getElementById('contactModal');
      if (e.target === modal) {
        modal.style.display = 'none';
      }
    }
  </script>

</body>
</html>
